server:
  port: 8080
  address: 0.0.0.0
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: edu-management-system

  # 设置控制台输出编码
  output:
    ansi:
      enabled: always

  # Jackson 日期格式配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
  
  profiles:
    active: dev
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  datasource:
    url: jdbc:h2:file:${user.home}/.edu-management-system/data/edu_management_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: edu-management-system-secret-key-2024
  expiration: 86400000
