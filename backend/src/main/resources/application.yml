server:
  port: 8080

spring:
  application:
    name: edu-management-system
  
  profiles:
    active: dev
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  datasource:
    url: jdbc:h2:mem:edu_management_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: edu-management-system-secret-key-2024
  expiration: 86400000

logging:
  level:
    com.edu.management: DEBUG
    org.springframework.security: DEBUG
