version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - edu-network
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/edu_management
      - SPRING_DATASOURCE_USERNAME=edu
      - SPRING_DATASOURCE_PASSWORD=edu123
    depends_on:
      - postgres
    networks:
      - edu-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    environment:
      - NGINX_HOST=0.0.0.0
    depends_on:
      - backend
    networks:
      - edu-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=edu_management
      - POSTGRES_USER=edu
      - POSTGRES_PASSWORD=edu123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - edu-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  edu-network:
    driver: bridge
