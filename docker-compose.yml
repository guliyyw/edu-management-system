version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/edu_management
      - SPRING_DATASOURCE_USERNAME=edu
      - SPRING_DATASOURCE_PASSWORD=edu123
    depends_on:
      - postgres
    networks:
      - edu-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - edu-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=edu_management
      - POSTGRES_USER=edu
      - POSTGRES_PASSWORD=edu123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - edu-network

volumes:
  postgres-data:

networks:
  edu-network:
    driver: bridge
